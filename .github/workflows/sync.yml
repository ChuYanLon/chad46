name: chad46 sync

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync themes & integrations
        id: sync
        run: |
          if bash sync.sh 2>&1; then
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for changes
        id: check
        if: steps.sync.outputs.success == 'true'
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        id: pr
        if: steps.sync.outputs.success == 'true' && steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync themes & integrations from NvChad/base46"
          title: "chore: sync themes & integrations"
          body: |
            Automated sync from [NvChad/base46](https://github.com/NvChad/base46).
          branch: sync/auto
          delete-branch: true

      - name: Enable auto-merge
        if: steps.sync.outputs.success == 'true' && steps.check.outputs.changed == 'true'
        run: |
          gh pr merge --auto --squash "${{ steps.pr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
