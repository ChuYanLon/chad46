name: chad46 sync

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync and commit
        shell: bash {0}
        run: |
          bash sync.sh || { echo "sync failed"; exit 1; }

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to sync"
            exit 0
          fi

          git config user.name "chad46 sync"
          git config user.email "sync@chad46"
          git add -A
          git commit -m "chore: sync themes & integrations from NvChad/base46"
          git push
