name: chad46 sync

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync and create PR
        shell: bash {0}
        run: |
          # 1. Sync
          bash sync.sh || { echo "sync failed"; exit 1; }

          # 2. Check for changes
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to sync"
            exit 0
          fi

          # 3. Configure git and commit
          git config user.name "chad46 sync"
          git config user.email "sync@chad46"
          BRANCH="sync/auto-$(date +%s)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: sync themes & integrations from NvChad/base46"

          # 4. Push
          git push origin "$BRANCH"

          # 5. Create PR
          PR_URL=$(gh pr create \
            --title "chore: sync themes & integrations" \
            --body "Automated sync from [NvChad/base46](https://github.com/NvChad/base46)." \
            --base main \
            --head "$BRANCH" \
            --repo "${{ github.repository }}")
          PR_NUM="${PR_URL##*/}"

          # 6. Enable auto-merge
          gh pr merge --auto --squash "$PR_NUM"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
